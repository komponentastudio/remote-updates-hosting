releaseNotes: "<h3>Call Stability + Grid Refresh</h3><ul><li><b>No false missed nudges</b>: Ending a normal 1to1 call no longer creates an incorrect missed-call nudge.</li><li><b>Resilient listeners</b>: Lobby and CallView now auto-recover user listeners after temporary auth permission flickers.</li><li><b>Stable Grid tiles</b>: Without screenshare, participant tiles stay stable (no active-speaker jumping).</li><li><b>Screenshare layout</b>: Shared content is now dominant with a fixed right participant strip and overflow counter.</li><li><b>Camera-off visuals</b>: In Grid mode, camera-off tiles now use modern, low-cost theme backgrounds derived from profile images, with adaptive effect reduction for smoother performance.</li><li><b>Active app badge restored</b>: The app indicator is visible again directly inside call bubbles and grid tiles.</li></ul>"