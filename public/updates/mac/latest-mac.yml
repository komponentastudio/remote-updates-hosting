releaseNotes: "<h3>Call & Grid Stability Update</h3><ul><li><b>Cleaner 1to1 transitions</b>: Closing or leaving during ringing now cleans invitation state more reliably.</li><li><b>Grid improvements</b>: With 2 participants, the other side stays dominant while your preview appears as PiP.</li><li><b>Screen-share cursors on correct monitor</b>: Cursor overlay now uses display metadata for more accurate monitor targeting.</li><li><b>Avatar resilience</b>: Temporary profile image load failures now retry once before fallback.</li></ul>"