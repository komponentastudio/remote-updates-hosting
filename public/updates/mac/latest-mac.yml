releaseNotes: "<h3>1to1 Call Teardown Hotfix</h3><ul><li><b>Decline now exits cleanly</b>: If the other side declines, you briefly see <b>Declined</b> and the call closes automatically instead of hanging in waiting state.</li><li><b>Nudges clean up correctly</b>: Return calls now clear stale nudge entries, so old call requests do not come back after the call ends.</li><li><b>Stability safeguards</b>: Added extra client and server cleanup protections for invitation race conditions.</li></ul>"