releaseNotes: "<h3>Login Reliability Fix</h3><ul><li><b>Fixes the stuck loading screen for all sign-in methods</b> (Google, Apple, Microsoft, Email, Magic Link, SSO). New accounts now finish setting up correctly and reach the lobby or onboarding screen.</li><li><b>Clear retry when account setup fails.</b> If the server is unreachable, you now see a friendly retry screen instead of an endless spinner.</li><li><b>Better workspace defaults for Apple Hide My Email and Microsoft live.com accounts</b> — they now correctly get a private workspace instead of a shared domain team.</li></ul>"