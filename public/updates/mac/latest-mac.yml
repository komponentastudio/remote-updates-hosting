releaseNotes: "<h3>Teams Overhaul</h3><ul><li><b>Email Invitations</b>: Invite teammates via branded email — they receive a beautiful invitation with your team logo and a one-click join button.</li><li><b>Smooth Team Switching</b>: Switching teams is now instant and smooth — no more black flash.</li><li><b>Admin Controls</b>: New team policies (restrict invites, domain auto-join), leave team, and delete team options in Settings.</li><li><b>Multi-Team Onboarding</b>: New users invited to multiple teams can now choose which to join during setup.</li><li><b>Security</b>: Invitation acceptance is now fully server-side for stronger protection.</li></ul>"