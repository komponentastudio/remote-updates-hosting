releaseNotes: "<h3>Screen Share Polish</h3><ul><li><b>Minimized view</b>: When you minimize screen share, a small thumbnail appears in the corner of your bubble so you can still see it — click it to expand again.</li><li><b>Visible buttons</b>: The minimize and fullscreen buttons on the screen share window are now easy to see on any background.</li><li><b>Resize</b>: Drag the corner of the screen share window to make it larger or smaller.</li><li><b>Cursors in bubble mode</b>: When watching someone's screen in bubble mode, you now see their cursor movements.</li></ul>"