releaseNotes: "<h3>Call UX & Agent Stability Hotfix</h3><ul><li><b>Bubbles/Grid polish</b>: Camera-off avatar fallback now works in bubbles, panel spacing is tighter, grid labels are cleaner, and decorative grid strokes were removed.</li><li><b>Presence cleanup</b>: Offline users no longer show stale active-app badges.</li><li><b>AI agent reliability</b>: Jester session handling is more stable in group calls and agent state listeners now auto-recover after transient permission issues.</li></ul>"