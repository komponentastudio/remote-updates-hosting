releaseNotes: "<h3>Authentication Stability Update</h3><ul><li><b>No more login flashes</b>: Fixed a case where the login screen could briefly appear during startup or while entering/leaving calls.</li><li><b>Smoother session handling</b>: Sign-in state now remains stable through transient sync events between app windows.</li><li><b>Reliable sign-out</b>: Manual logout now transitions immediately and predictably.</li><li><b>Google sign-in hardening</b>: Improved error handling and retry behavior for desktop Google authentication.</li></ul>"