releaseNotes: "<h3>✨ Call Improvements</h3><ul><li><b>Ringing... in group calls</b>: When you invite someone to a group room, their bubble appears immediately with a \"Ringing...\" shimmer so you know they're being notified.</li><li><b>Declined in group calls</b>: If they decline, their bubble briefly turns red with \"Declined\" — then disappears quietly, without interrupting the ongoing conversation.</li><li><b>Invite from sidebar</b>: While already in a call, the sidebar \"Call\" button becomes \"Invite\" (or \"Add\" for Jester) — tap it to pull someone into your current room without leaving.</li></ul>"