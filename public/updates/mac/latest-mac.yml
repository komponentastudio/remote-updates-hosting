releaseNotes: "<h3>1to1 & Invite Stability Update</h3><ul><li><b>Cleaner call teardown</b>: Closing the call window during ringing now properly clears pending call invites.</li><li><b>More reliable invitation state</b>: Call waiting/declined states now follow a deterministic invitation selection path instead of random snapshot order.</li><li><b>Fewer stuck states</b>: Reduced edge cases where old invite records could keep call UI in an incorrect waiting/preview state.</li></ul>"