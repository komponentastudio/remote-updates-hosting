releaseNotes: "<h3>What's New</h3><ul><li><b>Unified Media Engine</b>: All calls now use LiveKit SFU for better stability and future AI agent support in 1-to-1 calls.</li><li><b>Smoother Connection UX</b>: Instant loading indicators when users join, reconnect, or disconnect.</li><li><b>Sound Effects</b>: New ambient sounds for participant join/leave, screen sharing, and call events.</li><li><b>Auto-Leave</b>: 1-to-1 calls automatically end when your partner disconnects.</li></ul>"