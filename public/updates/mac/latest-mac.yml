releaseNotes: "<h3>Fixed</h3><ul><li><b>1-to-1 Calls</b>: Fixed a critical bug where calls could not connect due to a permissions error during call cleanup.</li><li><b>Notification Sound</b>: Fixed ring sound being cut off before it finished playing.</li></ul><h3>Improved</h3><ul><li><b>Call Button</b>: Greyed out when the person is already in a call.</li><li><b>Bell Sound</b>: Subtle feedback sound when you ring someone's bell.</li><li><b>AI Agent Calls</b>: Admins can now call Bavic directly.</li></ul>"