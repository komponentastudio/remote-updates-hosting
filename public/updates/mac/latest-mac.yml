releaseNotes: "<h3>Fixed</h3><ul><li><b>1-to-1 Calls</b>: Video and audio connections now work reliably, even behind firewalls.</li><li><b>Call Setup</b>: The \"Waiting...\" animation now shows correctly when calling someone.</li><li><b>Call Connectivity</b>: Fixed an issue where calls could fail to connect in the production app.</li></ul><h3>Improved</h3><ul><li><b>Group Calls</b>: A \"Connecting...\" indicator now appears while other participants' video is loading.</li><li><b>Error Tracking</b>: More detailed error reports are now sent to our monitoring system for faster debugging.</li></ul>"