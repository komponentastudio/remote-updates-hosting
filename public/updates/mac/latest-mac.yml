releaseNotes: "<h3>✨ Call & Chat Improvements</h3><ul><li><b>Declined calls</b>: When someone rejects your call, you now see a clear \"Declined\" indicator — no more guessing.</li><li><b>Camera on join</b>: Camera and microphone now activate reliably when accepting a 1-to-1 call.</li><li><b>Talk to Jester</b>: Click \"Talk\" next to Jester in the sidebar for an instant AI conversation — no ringing, just start talking.</li><li><b>Instant leave</b>: Leaving a call now feels immediate — the lobby appears right away while cleanup happens in the background.</li><li><b>Link previews</b>: Chat link thumbnails stay dismissed — they no longer reappear when rejoining a call.</li><li><b>Image viewer</b>: The close button on image previews now works correctly.</li><li><b>Nudge offline users</b>: You can now send a nudge even when a teammate is offline.</li><li><b>Join room from sidebar</b>: When a teammate is in a group room, the button now shows \"Join\" instead of \"Call\".</li></ul>"